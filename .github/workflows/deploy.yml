# GitHub Pages → Render へのリダイレクト
name: Deploy redirect to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Create redirect page
        run: |
          mkdir -p site
          cat > site/index.html <<'HTML'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://onpu.onrender.com/onpu/">
            <link rel="canonical" href="https://onpu.onrender.com/onpu/">
            <title>おんぷクイズ - リダイレクト中</title>
          </head>
          <body>
            <p><a href="https://onpu.onrender.com/onpu/">おんぷクイズへ移動します...</a></p>
          </body>
          </html>
          HTML
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
